# docker-compose.yml (simplified - see the official
# Langfuse compose for a full production stack)
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - langfuse

  langfuse:
    image: langfuse/langfuse:3
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pg:pg@db:5432/lf
      NEXTAUTH_SECRET: change-me
      SALT: change-me
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pg
      POSTGRES_PASSWORD: pg
      POSTGRES_DB: lf
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
