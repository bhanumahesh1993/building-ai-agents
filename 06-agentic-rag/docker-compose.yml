# docker-compose.yml — local dev: app + pgvector
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb
      POSTGRES_DB: kb
    ports: ["5432:5432"]
    volumes:
      - kbdata:/var/lib/postgresql/data

volumes:
  kbdata:
