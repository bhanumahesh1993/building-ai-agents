# docker-compose.demo.yml — LOCAL DEMO ONLY.
# Real deployments never share a compose file
# across two companies' infrastructure.
services:
  inventory:
    build: ./inventory_agent
    ports: ["8000:8000"]
    env_file: .env
  procurement:
    build: ./procurement_agent
    ports: ["8001:8001"]
    env_file: .env
    depends_on: [inventory]
