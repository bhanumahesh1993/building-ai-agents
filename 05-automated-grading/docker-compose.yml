# docker-compose.yml
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grading
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  pgdata:
